<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Admin — Central de Chamados</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="barra-voltar">
        <a href="paginainicial.html">← Voltar ao Início</a>
    </div>

    <!-- LOGIN -->

    <div id="loginAdmin" class="container">

        <h1>Área Administrativa</h1>

        <main>
            <input type="text"     id="usuario" placeholder="Usuário">
            <input type="password" id="senha"   placeholder="Senha">

            <button onclick="fazerLogin()">Entrar</button>

            <p id="erroLogin"></p>
        </main>

        <div class="marquee-container">
            <div class="marquee-content">
                🔔 Central de Chamados ETEC &nbsp;&nbsp;&nbsp; Registre suas solicitações de forma fácil e prática &nbsp;&nbsp;&nbsp; 🔔 Central de Chamados ETEC
            </div>
        </div>

    </div>

    <!-- PAINEL -->

    <div id="painelAdmin" class="container" style="display:none;">

        <div class="header-bar">
            <h1>Painel Administrativo</h1>
            <button class="btn-sair" onclick="logout()">Sair</button>
        </div>

        <div class="stats-row">
            <div class="stat-item stat-total active" onclick="filtrarPorStatus('Todos', this)">
                <div class="stat-numero" id="totalChamados">0</div>
                <div class="stat-rotulo">Total</div>
            </div>
            <div class="stat-item stat-aberto" onclick="filtrarPorStatus('Aberto', this)">
                <div class="stat-numero" id="abertos">0</div>
                <div class="stat-rotulo">Abertos</div>
            </div>
            <div class="stat-item stat-andamento" onclick="filtrarPorStatus('Em andamento', this)">
                <div class="stat-numero" id="andamento">0</div>
                <div class="stat-rotulo">Em andamento</div>
            </div>
            <div class="stat-item stat-resolvido" onclick="filtrarPorStatus('Resolvido', this)">
                <div class="stat-numero" id="resolvidos">0</div>
                <div class="stat-rotulo">Resolvidos</div>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab active" onclick="filtrarPorTipo('Todos', this)">Todos</button>
            <button class="tab" onclick="filtrarPorTipo('Máquina', this)">Máquina</button>
            <button class="tab" onclick="filtrarPorTipo('Internet', this)">Internet</button>
            <button class="tab" onclick="filtrarPorTipo('Limpeza', this)">Limpeza</button>
            <button class="tab" onclick="filtrarPorTipo('Reclamações', this)">Reclamações</button>
            <button class="tab" onclick="filtrarPorTipo('Laboratório', this)">Laboratório</button>
            <button class="tab" onclick="filtrarPorTipo('Outro', this)">Outro</button>
        </div>

        <input type="text" id="pesquisa" placeholder="🔍 Pesquisar chamado por nome, turma ou tipo...">

        <div id="listaChamados"></div>

    </div>

    <footer>
        <p>ETEC — Central de Chamados © 2026</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
